  <text x="56" y="146"><tspan fill="#e1e4e8">  </tspan><tspan fill="#01bdfe">local</tspan><tspan fill="#fdaccb"> limit </tspan><tspan fill="#ff4b82">=</tspan><tspan fill="#fdaccb"> 30</tspan></text>
  <text x="56" y="168"><tspan fill="#e1e4e8">  </tspan><tspan fill="#01bdfe">if</tspan><tspan fill="#fdaccb"> opts.max </tspan><tspan fill="#ff4b82">&gt;</tspan><tspan fill="#fdaccb"> limt </tspan><tspan fill="#01bdfe">then</tspan><tspan fill="#e1e4e8"> </tspan><tspan fill="#01bdfe">return</tspan><tspan fill="#fdaccb"> nil</tspan><tspan fill="#e1e4e8"> </tspan><tspan fill="#01bdfe">end</tspan></text>
