# https://direnv.net/man/direnv.toml.1.html

[global]
# \u001b is a TOML unicode escape for ESC (0x1b); do not use a literal ESC byte.
log_format = "\u001b[2mdirenv: %s\u001b[0m"
# Hide the noisy 'export +VAR -VAR ...' diff printed on every load.
hide_env_diff = true
# To silence the loading/using lines entirely instead, use:
# log_filter = "^$"
