# https://github.com/nikitabobko/AeroSpace
# https://nikitabobko.github.io/AeroSpace/guide#config-samples

after-login-command = []
after-startup-command = ['exec-and-forget sketchybar']
start-at-login = true

# Notify SketchyBar about workspace change
exec-on-workspace-change = ["/bin/bash", "-c",
  "sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE"
]

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 30

default-root-container-layout = "tiles" # tiles|accordion
default-root-container-orientation = "auto" # horizontal|vertical|auto
key-mapping.preset = "qwerty" # qwerty|dvorak

# Note: `outer.top` is updated through an alias that toggles SketchyBar.
[gaps]
  inner.horizontal = 24
  inner.vertical = 24
  outer.left = 20
  outer.bottom = 20
  outer.top = 46
  outer.right = 20

[exec]
  inherit-env-vars = true

[exec.env-vars]
  PATH = "/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}"

# Pin every workspace to the main monitor for now.
[workspace-to-monitor-force-assignment]
  1 = "main"
  2 = "main"
  3 = "main"
  4 = "main"
  5 = "main"
  6 = "main"
  7 = "main"
  8 = "main"
  9 = ["secondary", "main"]
  0 = ["secondary", "main"]

# https://nikitabobko.github.io/AeroSpace/guide#on-window-detected-callback
# Print the list of running applications that appears in the Dock and may have a user interface:
# > aerospace list-apps

[[on-window-detected]]
  if.app-id = "company.thebrowser.Browser"
  run = "move-node-to-workspace 1"

[[on-window-detected]]
  if.app-id = "org.alacritty"
  run = "move-node-to-workspace 2"

[[on-window-detected]]
  if.app-id = "com.DanPristupov.Fork"
  run = "move-node-to-workspace 2"

[[on-window-detected]]
  if.app-id = "com.microsoft.VSCode"
  run = "move-node-to-workspace 3"

[[on-window-detected]]
  if.app-id = "com.anthropic.claudefordesktop"
  run = "move-node-to-workspace 4"

[[on-window-detected]]
  if.app-id = "com.tinyspeck.slackmacgap"
  run = "move-node-to-workspace 6"

[[on-window-detected]]
  if.app-id = "com.hey.app.desktop"
  run = "move-node-to-workspace 7"

[[on-window-detected]]
  if.app-id = "com.cron.electron"
  run = "move-node-to-workspace 0"

[[on-window-detected]]
  if.app-id = "com.apple.systempreferences"
  run = "layout floating"

[[on-window-detected]]
  if.app-id = "at.obdev.littlesnitch.agent"
  run = "layout floating"

[[on-window-detected]]
  if.app-id = "at.obdev.littlesnitch.networkmonitor"
  run = "layout floating"

[[on-window-detected]]
  if.app-id = "at.obdev.littlesnitch"
  run = "layout floating"

[[on-window-detected]]
  if.app-id = "com.1password.1password"
  run = "layout floating"

[mode.main.binding]
  alt-shift-ctrl-s = ["mode service", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=service"]
  alt-shift-ctrl-a = ["mode move", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=move"]
  alt-shift-ctrl-1 = "workspace 1"
  alt-shift-ctrl-2 = "workspace 2"
  alt-shift-ctrl-3 = "workspace 3"
  alt-shift-ctrl-4 = "workspace 4"
  alt-shift-ctrl-5 = "workspace 5"
  alt-shift-ctrl-6 = "workspace 6"
  alt-shift-ctrl-7 = "workspace 7"
  alt-shift-ctrl-8 = "workspace 8"
  alt-shift-ctrl-9 = "workspace 9"
  alt-shift-ctrl-0 = "workspace 0"
  # alt-shift-ctrl-n = "layout sticky tiling"
  alt-shift-ctrl-m = "layout floating tiling"
  alt-shift-ctrl-comma = "layout accordion horizontal vertical"
  alt-shift-ctrl-period = "layout tiles horizontal vertical"
  alt-shift-ctrl-slash = "flatten-workspace-tree"
  alt-shift-ctrl-minus = "resize smart -50"
  alt-shift-ctrl-equal = "resize smart +50"
  alt-shift-ctrl-w = "close"
  alt-shift-ctrl-q = "close-all-windows-but-current"
  alt-shift-ctrl-d = "macos-native-minimize"
  alt-shift-ctrl-f = "fullscreen"
  alt-shift-ctrl-space = "macos-native-fullscreen"
  alt-shift-ctrl-backspace = "macos-native-fullscreen"
  alt-shift-ctrl-esc = "macos-native-fullscreen off"
  alt-shift-ctrl-backtick = "focus-monitor next --wrap-around"
  alt-shift-ctrl-h = "exec-and-forget $HOME/.config/aerospace/focus-or-workspace.sh left"
  alt-shift-ctrl-j = "focus --boundaries all-monitors-outer-frame --boundaries-action stop down"
  alt-shift-ctrl-k = "focus --boundaries all-monitors-outer-frame --boundaries-action stop up"
  alt-shift-ctrl-l = "exec-and-forget $HOME/.config/aerospace/focus-or-workspace.sh right"
  alt-shift-ctrl-right = "workspace --wrap-around next"
  alt-shift-ctrl-left = "workspace --wrap-around prev"
  alt-shift-ctrl-up = "workspace-back-and-forth"
  alt-shift-ctrl-down = "focus-back-and-forth"

[mode.move.binding]
  alt-shift-ctrl-esc = ["mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  esc = ["mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  h = ["move left", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  j = ["move down", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  k = ["move up", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  l = ["move right", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  1 = ["move-node-to-workspace --focus-follows-window 1", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  2 = ["move-node-to-workspace --focus-follows-window 2", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  3 = ["move-node-to-workspace --focus-follows-window 3", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  4 = ["move-node-to-workspace --focus-follows-window 4", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  5 = ["move-node-to-workspace --focus-follows-window 5", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  6 = ["move-node-to-workspace --focus-follows-window 6", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  7 = ["move-node-to-workspace --focus-follows-window 7", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  8 = ["move-node-to-workspace --focus-follows-window 8", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  9 = ["move-node-to-workspace --focus-follows-window 9", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  0 = ["move-node-to-workspace --focus-follows-window 0", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  n = ["move-node-to-workspace --focus-follows-window --wrap-around next", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  p = ["move-node-to-workspace --focus-follows-window --wrap-around prev", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  backtick = ["move-workspace-to-monitor --wrap-around next", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]

[mode.service.binding]
  alt-shift-ctrl-esc = ["mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  esc = ["mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
  r = ["reload-config", "mode main", "exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main"]
