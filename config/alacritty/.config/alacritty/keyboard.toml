[[keyboard.bindings]]
chars = "\u001B\r"
key = "Return"
mods = "Shift"

[[keyboard.bindings]] # Enter tmux command mode `‚åÉb` + `:`
chars = "\u0002:"
key = "Semicolon"
mods = "Command"

[[keyboard.bindings]] # Spread panes out evenly `‚åÉb` + `E`
chars = "\u0002E"
key = "E"
mods = "Command"

[[keyboard.bindings]] # Toggle panes synchronisation `‚åÉb` + `‚åÉs`
chars = "\u0002\u0013"
key = "E"
mods = "Command|Shift"

[[keyboard.bindings]] # Grab and open any URL from the terminal window `‚åÉb` + `u`
chars = "\u0002u"
key = "U"
mods = "Command"

[[keyboard.bindings]] # Show all windows `‚åÉb` + `w`
chars = "\u0002w" # \x02\x77
key = "P"
mods = "Command"

[[keyboard.bindings]] # Show all sessions `‚åÉb` + `s`
chars = "\u0002s" # \x10
key = "P"
mods = "Command|Shift"

[[keyboard.bindings]] # Search for a pane `‚åÉb` + `f`
chars = "\u0002f"
key = "F"
mods = "Command|Shift"

[[keyboard.bindings]] # Save environment `‚åÉb` + `S`
chars = "\u0002S"
key = "S"
mods = "Command"

[[keyboard.bindings]] # Restore environment `‚åÉb` + `R`
chars = "\u0002R" # \x02\x52
key = "S"
mods = "Command|Shift"

[[keyboard.bindings]] # Create a vertical pane `‚åÉb` + `%`
chars = "\u0002%"
key = "D"
mods = "Command"

[[keyboard.bindings]] # Create a horizontal pane `‚åÉb` + `"`
chars = "\u0002\""
key = "D"
mods = "Command|Shift"

[[keyboard.bindings]] # Create a new window/tab
chars = "\u0002c"
key = "T"
mods = "Command"

[[keyboard.bindings]] # Close current pane `‚åÉb` + `x`
chars = "\u0002x"
key = "W"
mods = "Command"

[[keyboard.bindings]] # Close current window/tab `‚åÉb` + `&`
chars = "\u0002&"
key = "W"
mods = "Command|Shift"

[[keyboard.bindings]] # Rename current window/tab `‚åÉb` + `,`
chars = "\u0002,"
key = "R"
mods = "Command"

[[keyboard.bindings]] # Rename current session `‚åÉb` + `$`
chars = "\u0002$"
key = "R"
mods = "Command|Shift"

[[keyboard.bindings]] # Reload tmux config `‚åÉb` + `‚åÉr`
chars = "\u0002\u0012"
key = "R"
mods = "Command|Alt"

[[keyboard.bindings]] # Kill current session `‚åÉb` + `Q`
chars = "\u0002Q"
key = "W"
mods = "Command|Alt"

[[keyboard.bindings]] # Move to previous session `‚åÉb` + `(`
chars = "\u0002("
key = "Left"
mods = "Command|Shift"

[[keyboard.bindings]] # Move to next session `‚åÉb` + `)`
chars = "\u0002)"
key = "Right"
mods = "Command|Shift"

[[keyboard.bindings]] # Move to previous window/tab `‚åÉb` + `p`
chars = "\u0002p"
key = "Tab"
mods = "Control|Shift"

[[keyboard.bindings]] # Move to next window/tab `‚åÉb` + `n`
chars = "\u0002n"
key = "Tab"
mods = "Control"

[[keyboard.bindings]] # Resize current pane to left `‚åÉb` + `H`
chars = "\u0002H"
key = "Left"
mods = "Command"

[[keyboard.bindings]] # Resize current pane to down `‚åÉb` + `J`
chars = "\u0002J"
key = "Down"
mods = "Command"

[[keyboard.bindings]] # Resize current pane to up `‚åÉb` + `K`
chars = "\u0002K"
key = "Up"
mods = "Command"

[[keyboard.bindings]] # Resize current pane to right `‚åÉb` + `L`
chars = "\u0002L"
key = "Right"
mods = "Command"

[[keyboard.bindings]] # Switch to window/tab #1 `‚åÉb` + `1`
chars = "\u00021"
key = "Key1"
mods = "Command"

[[keyboard.bindings]] # Switch to window/tab #2 `‚åÉb` + `2`
chars = "\u00022"
key = "Key2"
mods = "Command"

[[keyboard.bindings]] # Switch to window/tab #3 `‚åÉb` + `3`
chars = "\u00023"
key = "Key3"
mods = "Command"

[[keyboard.bindings]] # Switch to window/tab #4 `‚åÉb` + `4`
chars = "\u00024"
key = "Key4"
mods = "Command"

[[keyboard.bindings]] # Switch to window/tab #5 `‚åÉb` + `5`
chars = "\u00025"
key = "Key5"
mods = "Command"

[[keyboard.bindings]] # Switch to window/tab #6 `‚åÉb` + `6`
chars = "\u00026"
key = "Key6"
mods = "Command"

[[keyboard.bindings]] # Switch to window/tab #7 `‚åÉb` + `7`
chars = "\u00027"
key = "Key7"
mods = "Command"

[[keyboard.bindings]] # Switch to window/tab #8 `‚åÉb` + `8`
chars = "\u00028"
key = "Key8"
mods = "Command"

[[keyboard.bindings]] # Switch to window/tab #9 `‚åÉb` + `9`
chars = "\u00029"
key = "Key9"
mods = "Command"

[[keyboard.bindings]] # Start tmux copy mode
chars = "\u0002["
key = "C"
mods = "Command"

[[keyboard.bindings]] # Send `<C-q>` https://github.com/alacritty/alacritty/issues/1359
chars = "\u0011"
key = "Q"
mods = "Control"

[[keyboard.bindings]] # Send `<C-n>i` and map it `<C-i>` in VIM
chars = "\u000Ei"
key = "I"
mods = "Control"
