# ┌─┐┬ ┬   ┌┬┐┬ ┬   ┌─┐┌─┐┌─┐┬ ┬
# │ │├─┤───│││└┬┘───├─┘│ │└─┐├─┤
# └─┘┴ ┴   ┴ ┴ ┴    ┴  └─┘└─┘┴ ┴
# https://ohmyposh.dev/docs

version = 3
final_space = true
console_title_template = '{{ .Shell }} in {{ .Folder }}'

# Line 1, left: directory · git
[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true     # blank line above every prompt (sparse look)

[[blocks.segments]]
type = 'path'
style = 'plain'
foreground_templates = ['{{ .Env.PALETTE_SY_FUNCTION }}']
template = '{{ .Path }}'

[blocks.segments.properties]
style = 'full'

[[blocks.segments]]
type = 'git'
style = 'plain'
foreground_templates = ['{{ .Env.PALETTE_SE_HINT }}']
# Muted branch; '*' when dirty; ahead/behind arrows via an inline span.
template = ' {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }} <{{ .Env.PALETTE_SE_PRIMARY }}>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>'

[blocks.segments.properties]
branch_icon = ''
commit_icon = '@'
fetch_status = true

# Line 1, right: previous command duration (>= 5s)
[[blocks]]
type = 'rprompt'
overflow = 'hidden'

[[blocks.segments]]
type = 'executiontime'
style = 'plain'
foreground_templates = ['{{ .Env.PALETTE_SE_WARNING }}']
template = '{{ .FormattedMs }}'

[blocks.segments.properties]
threshold = 5000

# Line 2, left: prompt character (focus color ok, error color on failure)
[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

[[blocks.segments]]
type = 'text'
style = 'plain'
foreground_templates = [
  '{{ if gt .Code 0 }}{{ .Env.PALETTE_SE_ERROR }}{{ end }}',
  '{{ if eq .Code 0 }}{{ .Env.PALETTE_SE_FOCUS }}{{ end }}',
]
template = '❯'

# Transient prompt: collapse accepted commands, keep status colour
[transient_prompt]
background = 'transparent'
foreground_templates = [
  '{{ if gt .Code 0 }}{{ .Env.PALETTE_SE_ERROR }}{{ end }}',
  '{{ if eq .Code 0 }}{{ .Env.PALETTE_SE_FOCUS }}{{ end }}',
]
template = '❯ '

# Continuation prompt for multi-line input (static colors only here, so the
# palette color is applied via an inline span instead of foreground)
[secondary_prompt]
background = 'transparent'
template = '<{{ .Env.PALETTE_SE_FOCUS }}>❯❯</> '
